name: APK Yapici
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Python Kur
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Buildozer Kur ve APK Yap
        run: |
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-dev zip unzip openjdk-17-jdk
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv
          export PATH=$PATH:$HOME/.local/bin
          # OTOMATIK LISANS KABULÜ BURADA:
          yes | buildozer -v android debug
          
